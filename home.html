<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopVault — Product Catalogue</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface2: #f8f9fc;
      --border: #e4e8f0;
      --accent: #5b4fff;
      --accent-light: #ede9ff;
      --accent-glow: rgba(91,79,255,0.12);
      --accent2: #00a372;
      --accent2-light: #e5f8f2;
      --danger: #e63559;
      --danger-light: #fff0f3;
      --danger-border: #ffc9d3;
      --text: #0f0e1a;
      --text2: #3d3a52;
      --muted: #7b7998;
      --muted2: #b0aec6;
      --shadow: rgba(91,79,255,0.07);
      --shadow-md: rgba(15,14,26,0.09);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 2.5rem; display: flex; align-items: center; justify-content: space-between;
      height: 68px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px var(--shadow);
    }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #8b7dff);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; box-shadow: 0 4px 14px var(--accent-glow);
    }
    .logo h1 { font-family: 'Syne', sans-serif; font-size: 1.35rem; color: var(--text); }
    .logo h1 span { color: var(--accent); }

    .btn-add {
      background: var(--accent); color: #fff; border: none;
      padding: 0.52rem 1.2rem; border-radius: 9px; font-size: 0.875rem; font-weight: 500;
      font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 0.4rem;
      transition: all 0.2s; text-decoration: none; box-shadow: 0 4px 14px var(--accent-glow);
    }
    .btn-add:hover { background: #4a3ee0; transform: translateY(-1px); box-shadow: 0 6px 22px var(--accent-glow); }

    main { max-width: 1120px; margin: 2.5rem auto; padding: 0 2rem; }

    .page-title { font-family: 'Syne', sans-serif; font-size: 1.85rem; font-weight: 800; color: var(--text); margin-bottom: 0.25rem; }
    .page-sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }

    .stats { display: flex; gap: 1rem; margin-bottom: 1.8rem; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.1rem 1.5rem; flex: 1;
      box-shadow: 0 2px 12px var(--shadow);
    }
    .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 1.65rem; margin-top: 0.2rem; color: var(--text); }
    .stat-value.purple { color: var(--accent); }
    .stat-value.green { color: var(--accent2); }

    .search-wrap { margin-bottom: 1.4rem; position: relative; }
    .search-wrap svg { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted2); pointer-events: none; }
    #search-input {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 11px; padding: 0.72rem 1rem 0.72rem 2.8rem;
      font-size: 0.9rem; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; box-shadow: 0 1px 6px var(--shadow);
    }
    #search-input::placeholder { color: var(--muted2); }
    #search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 28px var(--shadow-md);
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface2); border-bottom: 1.5px solid var(--border); }
    th {
      padding: 0.9rem 1.2rem; text-align: left; font-weight: 600;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafaff; }
    td { padding: 1rem 1.2rem; font-size: 0.9rem; vertical-align: middle; }

    .prod-name { font-weight: 600; color: var(--text); }
    .prod-desc { color: var(--muted); font-size: 0.8rem; margin-top: 0.18rem; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .price-chip {
      display: inline-block; background: var(--accent2-light); color: var(--accent2);
      border: 1px solid #a8e8d4; border-radius: 7px; padding: 0.2rem 0.58rem;
      font-size: 0.82rem; font-weight: 600;
    }
    .qty-chip { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.85rem; color: var(--text2); }
    .qty-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .id-text { font-size: 0.78rem; color: var(--muted2); font-family: monospace; }

    .actions { display: flex; gap: 0.45rem; }
    .btn-edit, .btn-delete {
      border: none; border-radius: 8px; padding: 0.38rem 0.85rem;
      font-size: 0.78rem; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 0.3rem;
      transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .btn-edit { background: var(--accent-light); color: var(--accent); border: 1px solid #d0c9ff; }
    .btn-edit:hover { background: #ddd8ff; transform: translateY(-1px); }
    .btn-delete { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger-border); }
    .btn-delete:hover { background: #ffd9e2; transform: translateY(-1px); }

    .state-row td { text-align: center; padding: 3.5rem; color: var(--muted); }
    .spinner {
      width: 30px; height: 30px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 0.9rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.8rem;
      box-shadow: 0 12px 40px var(--shadow-md);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999; min-width: 260px; position: fixed;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast-title { font-weight: 600; font-size: 0.9rem; color: var(--text); }
    .toast-sub { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .toast-bar {
      position: absolute; bottom: 0; left: 0; height: 3px;
      background: var(--accent); border-radius: 0 0 14px 14px;
      width: 0; transition: width 1.1s linear;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">🛍️</div>
    <h1>Shop<span>Vault</span></h1>
  </div>
  <a href="addProduct.html" class="btn-add">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Product
  </a>
</header>

<main>
  <h2 class="page-title">Product Catalogue</h2>
  <p class="page-sub">View, manage and update your entire product inventory.</p>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="Search products by name or description…" oninput="filterProducts(this.value)"/>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Product</th><th>Price</th><th>Quantity</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="product-table">
        <tr class="state-row"><td colspan="5"><div class="spinner"></div>Loading products…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast">
  <div style="font-size:1.4rem" id="toast-icon">✅</div>
  <div>
    <div class="toast-title" id="toast-title">Done!</div>
    <div class="toast-sub" id="toast-sub">Operation completed.</div>
  </div>
  <div class="toast-bar" id="toast-bar"></div>
</div>

<script>
  const API = 'http://localhost:8080/products';
  let allProducts = [];

  async function loadProducts() {
    try {
      const res = await fetch(API);
      const json = await res.json();
      allProducts = json.data || [];
      renderProducts(allProducts);
    } catch(e) {
      document.getElementById('product-table').innerHTML =
        `<tr class="state-row"><td colspan="5">⚠️ Failed to load products. Is the server running?</td></tr>`;
    }
  }


  function filterProducts(keyword) {
    const kw = keyword.toLowerCase().trim();
    renderProducts(kw ? allProducts.filter(p =>
      p.name.toLowerCase().includes(kw) || (p.description || '').toLowerCase().includes(kw)
    ) : allProducts);
  }

  function renderProducts(products) {
    const tbody = document.getElementById('product-table');
    if (!products.length) {
      tbody.innerHTML = `<tr class="state-row"><td colspan="5">No products found. Add your first product!</td></tr>`;
      return;
    }
    tbody.innerHTML = products.map(p => `
      <tr>
        <td class="id-text">${p.id}</td>
        <td>
          <div class="prod-name">${esc(p.name)}</div>
          <div class="prod-desc">${esc(p.description || '—')}</div>
        </td>
        <td><span class="price-chip">₹${Number(p.price).toFixed(2)}</span></td>
        <td><span class="qty-chip"><span class="qty-dot"></span>${p.quantity}</span></td>
        <td>
          <div class="actions">
            <button class="btn-edit" onclick="editProduct(${p.id})">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </button>
            <button class="btn-delete" onclick="deleteProduct(${p.id}, '${esc(p.name)}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              Delete
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function editProduct(id) { window.location.href = `addProduct.html?id=${id}`; }
  function deleteProduct(id, name) { window.location.href = `deleteProduct.html?id=${id}&name=${encodeURIComponent(name)}`; }

  const params = new URLSearchParams(location.search);
  if (params.get('success')) {
    const messages = {
      added:   ['Product Added! 🎉', 'New product is live in your catalogue.'],
      updated: ['Product Updated! ✏️', 'Changes have been saved successfully.'],
      deleted: ['Product Deleted! 🗑️', 'The product has been removed.'],
    };
    const [title, sub] = messages[params.get('success')] || ['Done!', 'Operation completed.'];
    document.getElementById('toast-title').textContent = title;
    document.getElementById('toast-sub').textContent = sub;
    const toast = document.getElementById('toast');
    setTimeout(() => { toast.classList.add('show'); setTimeout(() => { document.getElementById('toast-bar').style.width = '100%'; }, 50); }, 300);
    setTimeout(() => { toast.classList.remove('show'); }, 1400);
    history.replaceState({}, '', 'home.html');
  }

  loadProducts();
</script>
</body>
</html>
